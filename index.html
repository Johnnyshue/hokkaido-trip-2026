function getIcon(d) {
  const n = d.name;
  // 特定關鍵字優先（細→粗）
  if (/煙火|花火/.test(n)) return '🎆';
  if (/運河/.test(n)) return '🌉';
  if (/紅磚|赤レンガ/.test(n)) return '🧱';
  if (/機場|空港/.test(n)) return '✈️';
  if (/駅|鐵道|列車/.test(n)) return '🚂';
  if (/纜車|ロープウェイ/.test(n)) return '🚠';
  if (/夜景|藻岩|函館山/.test(n)) return '🌃';
  if (/遊船|汽船|遊覽|獨木舟|観光船|觀光船/.test(n)) return '🚢';
  if (/企鵝/.test(n)) return '🐧';
  if (/熊|クマ|くま/.test(n)) return '🐻';
  if (/水族|海洋公園|海豚/.test(n)) return '🐟';
  if (/動物園/.test(n)) return '🦁';
  if (/神宮|神社/.test(n)) return '⛩️';
  if (/寺|修道院|善光/.test(n)) return '🛕';
  if (/教會|教堂|正教|ハリストス/.test(n)) return '⛪';
  if (/城|奉行所|伊達時代村/.test(n)) return '🏯';

let currentZone = 'A';
const selected = new Set(JSON.parse(localStorage.getItem('hokkaido_selected') || '[]'));

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const rating = document.getElementById('filterRating').value;
  const type = document.getElementById('filterType').value;

  const filtered = DATA.filter(d =>
    d.zone === currentZone &&
    (!search || d.name.toLowerCase().includes(search) || d.desc.toLowerCase().includes(search)) &&
    (!rating || d.rating == rating) &&
    (!type || d.type === type)
  );

  const container = document.getElementById('items');
  const empty = document.getElementById('emptyMsg');
  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    container.innerHTML = filtered.map(d => {
      const stars = '⭐'.repeat(d.rating);
      const ratingClass = `rating-${d.rating}`;
      const checked = selected.has(d.id);
      const typeColor = {
        '景點': 'bg-blue-100 text-blue-700',
        '美食': 'bg-orange-100 text-orange-700',
        '購物': 'bg-pink-100 text-pink-700',
        '溫泉': 'bg-purple-100 text-purple-700'
      }[d.type] || 'bg-gray-100 text-gray-700';
      const icon = getIcon(d);
      return `
      <div class="card ${checked ? 'checked' : ''} bg-white border border-gray-200 rounded-lg flex flex-col" data-id="${d.id}">
        <div class="card-icon icon-${d.type}"><span>${icon}</span></div>
        <div class="p-3 flex items-start gap-2">
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggle('${d.id}')" class="mt-1 w-4 h-4 accent-teal-600 flex-shrink-0">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1 flex-wrap">
              <span class="text-xs font-mono text-gray-400">${d.id}</span>
              <span class="px-1.5 py-0.5 text-xs rounded ${typeColor}">${d.type}</span>
              <span class="text-xs ${ratingClass}">${stars}</span>
            </div>
            <div class="font-semibold text-sm mt-1 leading-tight">${d.name}</div>
            <div class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">${d.desc}</div>
            <div class="text-xs text-teal-700 dark:text-teal-400 font-medium mt-1">${d.price}</div>
            <div class="flex gap-2 mt-2 text-xs">
              <a href="${d.web}" target="_blank" rel="noopener" class="text-blue-600 hover:underline">🌐 官網</a>
              <a href="${d.map}" target="_blank" rel="noopener" class="text-red-600 hover:underline">📍 Maps</a>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
}

function switchTab(zone) {
  currentZone = zone;
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === zone) {
      b.classList.add('tab-active');
      b.classList.remove('bg-gray-200');
    } else {
      b.classList.remove('tab-active');
      b.classList.add('bg-gray-200');
    }
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggle(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  localStorage.setItem('hokkaido_selected', JSON.stringify([...selected]));
  document.getElementById('selectedCount').textContent = selected.size;
  render();
}

function exportSelection() {
  if (selected.size === 0) {
    alert('還沒選任何項目喔');
    return;
  }
  const sorted = [...selected].sort((a, b) => {
    const [az, an] = [a[0], parseInt(a.slice(1)) || 0];
    const [bz, bn] = [b[0], parseInt(b.slice(1)) || 0];
    return az.localeCompare(bz) || an - bn;
  });
  const items = sorted.map(id => {
    const d = DATA.find(x => x.id === id);
    return d ? `${id} ${d.name} (${d.type})` : id;
  }).join('\n');
  const text = `# 我的北海道選擇（${selected.size} 項）\n\nID 清單：${sorted.join(', ')}\n\n詳細：\n${items}`;
  document.getElementById('exportText').value = text;
  document.getElementById('exportCount').textContent = selected.size;
  document.getElementById('exportModal').classList.remove('hidden');
}

function copyExport() {
  const ta = document.getElementById('exportText');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    alert('已複製到剪貼簿！貼回 Claude 即可');
  });
}

function closeModal() {
  document.getElementById('exportModal').classList.add('hidden');
}

function clearAll() {
  if (!confirm('確定清除所有勾選？')) return;
  selected.clear();
  localStorage.setItem('hokkaido_selected', '[]');
  document.getElementById('selectedCount').textContent = 0;
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterRating').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('selectedCount').textContent = selected.size;
render();
</script>
</body>
</html>
